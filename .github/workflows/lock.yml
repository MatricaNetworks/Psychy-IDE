name: Lock Closed Threads

on:
  schedule:
    - cron: '0 2 * * *'

jobs:
  lock:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      discussions: write
    steps:
      - uses: dessant/lock-threads@v5
        with:
          github-token: ${{ github.token }}
          issue-inactive-days: '90'
          pr-inactive-days: '90'
          discussion-inactive-days: '90'
          log-output: true
